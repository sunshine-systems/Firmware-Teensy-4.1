name: Release (bump firmware version)

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (official cuts a tagged release, dev tags current main as v<current>-dev prerelease)'
        type: choice
        required: true
        default: official
        options:
          - official
          - dev
      bump_type:
        description: 'Version bump (official only; ignored for dev)'
        type: choice
        required: true
        default: minor
        options:
          - minor
          - major

permissions:
  contents: write
  actions: write

env:
  CONFIG_FILE: firmware/libraries/USBHostProxy/examples/SunshineUSBProxy/Config.h

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse current FIRMWARE_VERSION
        id: current
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$CONFIG_FILE" ]; then
            echo "ERROR: Config file not found at $CONFIG_FILE" >&2
            exit 1
          fi

          # Extract the value that follows '#define FIRMWARE_VERSION '
          current_version=$(grep -E '^#define[[:space:]]+FIRMWARE_VERSION[[:space:]]+' "$CONFIG_FILE" \
            | head -n1 \
            | sed -E 's/^#define[[:space:]]+FIRMWARE_VERSION[[:space:]]+([0-9]+\.[0-9]+).*$/\1/')

          if [ -z "$current_version" ]; then
            echo "ERROR: Could not parse FIRMWARE_VERSION from $CONFIG_FILE" >&2
            exit 1
          fi

          if ! [[ "$current_version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Parsed version '$current_version' does not match MAJOR.MINOR format" >&2
            exit 1
          fi

          echo "Current version: $current_version"
          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"

      - name: Compute new version and tag
        id: next
        shell: bash
        run: |
          set -euo pipefail

          current="${{ steps.current.outputs.current_version }}"
          release_type="${{ github.event.inputs.release_type }}"
          bump="${{ github.event.inputs.bump_type }}"

          major="${current%.*}"
          minor="${current#*.}"

          case "$release_type" in
            official)
              case "$bump" in
                minor)
                  new_minor=$((minor + 1))
                  new_version="${major}.${new_minor}"
                  ;;
                major)
                  new_major=$((major + 1))
                  new_version="${new_major}.0"
                  ;;
                *)
                  echo "ERROR: Unknown bump type '$bump'" >&2
                  exit 1
                  ;;
              esac
              new_tag="v${new_version}"
              ;;
            dev)
              new_version="$current"
              SHORT_SHA=$(git rev-parse --short HEAD)
              new_tag="v${current}-dev-${SHORT_SHA}"
              ;;
            *)
              echo "ERROR: Unknown release type '$release_type'" >&2
              exit 1
              ;;
          esac

          echo "Release type: $release_type"
          echo "New version: $new_version"
          echo "New tag:     $new_tag"
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        shell: bash
        run: |
          set -euo pipefail

          new_tag="${{ steps.next.outputs.new_tag }}"

          # Fetch tags from remote so we have an up-to-date view
          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/$new_tag" >/dev/null; then
            echo "ERROR: Tag $new_tag already exists locally" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$new_tag" >/dev/null 2>&1; then
            echo "ERROR: Tag $new_tag already exists on remote" >&2
            exit 1
          fi

          echo "Tag $new_tag is available."

      - name: Configure git user
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Patch, commit, tag, and push
        shell: bash
        run: |
          set -euo pipefail

          release_type="${{ github.event.inputs.release_type }}"
          current="${{ steps.current.outputs.current_version }}"
          new_version="${{ steps.next.outputs.new_version }}"
          new_tag="${{ steps.next.outputs.new_tag }}"
          branch="${GITHUB_REF#refs/heads/}"

          if [ "$release_type" = "official" ]; then
            # Escape dots in the old value for the sed regex
            escaped_current=$(printf '%s' "$current" | sed -e 's/[.]/\\./g')

            # Anchored replace: '#define FIRMWARE_VERSION <old>' -> '#define FIRMWARE_VERSION <new>'
            sed -i -E "s|^(#define[[:space:]]+FIRMWARE_VERSION[[:space:]]+)${escaped_current}([[:space:]]*)$|\1${new_version}\2|" "$CONFIG_FILE"

            if git diff --quiet -- "$CONFIG_FILE"; then
              echo "ERROR: sed produced no change in $CONFIG_FILE — parse/replace mismatch." >&2
              echo "----- Current matching lines: -----" >&2
              grep -nE '^#define[[:space:]]+FIRMWARE_VERSION' "$CONFIG_FILE" >&2 || true
              exit 1
            fi

            echo "----- Diff for $CONFIG_FILE: -----"
            git --no-pager diff -- "$CONFIG_FILE"

            git add -- "$CONFIG_FILE"
            git commit -m "Version: bump to ${new_version}"
            git tag -a "$new_tag" -m "Release ${new_tag}"
            git push origin "HEAD:${branch}"
            git push origin "refs/tags/${new_tag}"
          else
            # dev: no Config.h edit, no source commit; just tag current main.
            git tag -a "$new_tag" -m "Pre-release ${new_tag}"
            git push origin "refs/tags/${new_tag}"
          fi

      - name: Dispatch build workflow at new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.next.outputs.new_tag }}
        run: |
          set -euo pipefail
          # GITHUB_TOKEN pushes don't fire other workflows, so explicitly
          # dispatch build-teensy.yml at the new tag. The dispatched run sees
          # github.ref=refs/tags/<TAG>, so the build's rename + release-upload
          # logic behaves identically to a real tag push.
          echo "Dispatching build-teensy.yml at ref ${TAG}"
          gh workflow run build-teensy.yml --ref "${TAG}" --repo "${GITHUB_REPOSITORY}"

      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          release_type="${{ github.event.inputs.release_type }}"
          old="${{ steps.current.outputs.current_version }}"
          new="${{ steps.next.outputs.new_version }}"
          tag="${{ steps.next.outputs.new_tag }}"

          if [ "$release_type" = "dev" ]; then
            kind="prerelease (dev)"
            hex_note="\`streamcheats_teensy-4.1_rel-${new:-unknown}-dev.hex\` attached to a GitHub **Pre-release**"
            bump_cell="n/a (dev)"
          else
            kind="release (official)"
            hex_note="\`streamcheats_teensy-4.1_rel-${new:-unknown}.hex\` attached to a GitHub Release"
            bump_cell="\`${{ github.event.inputs.bump_type }}\`"
          fi

          {
            echo "## Firmware release"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Release type | \`${release_type}\` ($kind) |"
            echo "| Bump type | ${bump_cell} |"
            echo "| Old version | \`${old:-unknown}\` |"
            echo "| New version | \`${new:-unknown}\` |"
            echo "| Tag created | \`${tag:-unknown}\` |"
            echo ""
            echo "The \`Build SunshineUSBProxy Firmware\` workflow is triggered by tags matching \`v*\`, so it will pick up \`${tag:-unknown}\` and produce: ${hex_note}."
          } >> "$GITHUB_STEP_SUMMARY"
